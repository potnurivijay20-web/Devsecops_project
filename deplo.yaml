
apiVersion: apps/v1
kind: Deployment
metadata:
  name: Zepoty-deployment
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: Zepoty
  template:
    metadata:
      labels:
        app: Zepoty
    spec:
      containers:
      - name: Zepoty-container
        image: vijay81503199

/Zepoty
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: Zepoty-service
spec:
  type: LoadBalancer
  selector:
    app: bingo
  ports:
  - port: 80
    targetPort: 3000
